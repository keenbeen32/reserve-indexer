# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: dtf-indexer-envio
schema: schema.graphql

# Global field selection — events need tx.hash for entity IDs and the
# getTransactionReceipt Effect, and tx.from to capture deployer addresses
# (subgraph reads event.transaction.from for FolioDeployed.deployer).
field_selection:
  transaction_fields:
    - hash
    - from

contracts:
  # ============================================================
  # Static contracts (have addresses per chain)
  # ============================================================

  - name: RSR
    abi_file_path: ./abis/erc20.json
    events:
      # Indexed Transfer; handler filters where to == 0x...dEaD (the burn sink).
      - event: Transfer(address indexed from, address indexed to, uint256 value)

  - name: FolioDeployer
    abi_file_path: ./abis/folio-deployer.json
    events:
      - event: FolioDeployed(address indexed folioOwner, address indexed folio, address folioAdmin)
      - event: GovernedFolioDeployed(address indexed stToken, address indexed folio, address ownerGovernor, address ownerTimelock, address tradingGovernor, address tradingTimelock)

  - name: GovernanceDeployer
    abi_file_path: ./abis/governance-deployer.json
    events:
      - event: DeployedGovernedStakingToken(address indexed underlying, address indexed stToken, address governor, address timelock)

  - name: BridgedDTF
    abi_file_path: ./abis/erc20.json
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 value)

  # ============================================================
  # Dynamic contracts (registered at runtime via contractRegister;
  # no address block in chains[*].contracts).
  # Tuple components are anonymous — Envio's human-readable ABI parser
  # does not accept named tuple components.
  # ============================================================

  - name: DTF
    abi_file_path: ./abis/dtf.json
    events:
      # v4.0 RebalanceStarted: tokens[], weights[], prices[] separate arrays.
      - event: RebalanceStarted(uint256 nonce, uint8 priceControl, address[] tokens, (uint256,uint256,uint256)[] weights, (uint256,uint256)[] prices, (uint256,uint256,uint256) limits, uint256 restrictedUntil, uint256 availableUntil)
        name: RebalanceStartedV4

      # v5.0 RebalanceStarted: tokens[] struct = (token, weight, price, maxAuctionSize, inRebalance)
      - event: RebalanceStarted(uint256 indexed nonce, uint8 priceControl, (address,(uint256,uint256,uint256),(uint256,uint256),uint256,bool)[] tokens, (uint256,uint256,uint256) limits, uint256 startedAt, uint256 restrictedUntil, uint256 availableUntil, bool bidsEnabled)
        name: RebalanceStartedV5

      - event: RebalanceEnded(uint256 nonce)
      - event: RebalanceControlSet((bool,uint8) newControl)

      # v5.0 settings
      - event: BidsEnabledSet(bool bidsEnabled)
      - event: NameSet(string newName)
      - event: TrustedFillerRegistrySet(address trustedFillerRegistry, bool isEnabled)

      # v5.0 singleton auction
      - event: AuctionOpened(uint256 indexed rebalanceNonce, uint256 indexed auctionId, address[] tokens, (uint256,uint256,uint256)[] weights, (uint256,uint256)[] prices, (uint256,uint256,uint256) limits, uint256 startTime, uint256 endTime)
        name: AuctionOpenedV5
      - event: AuctionBid(uint256 indexed auctionId, address indexed sellToken, address indexed buyToken, uint256 sellAmount, uint256 buyAmount)
        name: AuctionBidV5
      - event: AuctionTrustedFillCreated(uint256 indexed auctionId, address filler)

      # Transfer (no receipt:true — mint/burn detection only needs from/to/value).
      - event: Transfer(address indexed from, address indexed to, uint256 value)

      # Fees
      - event: FolioFeePaid(address indexed recipient, uint256 amount)
      - event: ProtocolFeePaid(address indexed recipient, uint256 amount)

      # Access control
      - event: RoleGranted(bytes32 indexed role, address indexed account, address indexed sender)
      - event: RoleRevoked(bytes32 indexed role, address indexed account, address indexed sender)

      # Parameter setters
      - event: MintFeeSet(uint256 newFee)
      - event: TVLFeeSet(uint256 newFee, uint256 feeAnnually)
      - event: AuctionDelaySet(uint256 newAuctionDelay)
      - event: AuctionLengthSet(uint256 newAuctionLength)
      - event: MandateSet(string newMandate)
      - event: FeeRecipientsSet((address,uint96)[] recipients)

      # Deprecated v1.0 / v2.0 auction events
      - event: AuctionApproved(uint256 indexed auctionId, address indexed from, address indexed to, (uint256,address,address,(uint256,uint256,uint256),(uint256,uint256,uint256),(uint256,uint256),uint256,uint256,uint256,uint256,uint256) auction)
        name: AuctionApprovedV1
      - event: AuctionApproved(uint256 indexed auctionId, address indexed from, address indexed to, (uint256,address,address,(uint256,uint256,uint256),(uint256,uint256,uint256),(uint256,uint256),uint256,uint256,uint256,uint256,uint256) auction, ((uint256,uint256),uint256) details)
        name: AuctionApprovedV2
      - event: AuctionOpened(uint256 indexed auctionId, (uint256,address,address,(uint256,uint256,uint256),(uint256,uint256,uint256),(uint256,uint256),uint256,uint256,uint256,uint256,uint256) auction)
        name: AuctionOpenedV1
      - event: AuctionOpened(uint256 indexed auctionId, (uint256,address,address,(uint256,uint256,uint256),(uint256,uint256,uint256),(uint256,uint256),uint256,uint256,uint256,uint256,uint256) auction, uint256 runsRemaining)
        name: AuctionOpenedV2
      - event: AuctionClosed(uint256 indexed auctionId)
      - event: AuctionBid(uint256 indexed auctionId, uint256 sellAmount, uint256 buyAmount)
        name: AuctionBidV1

  - name: StakingToken
    abi_file_path: ./abis/staking-vault.json
    events:
      - event: RewardTokenAdded(address rewardToken)
      - event: RewardTokenRemoved(address rewardToken)
      - event: DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)
      - event: DelegateVotesChanged(address indexed delegate, uint256 previousVotes, uint256 newVotes)
      - event: OptimisticDelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)
      - event: OptimisticDelegateVotesChanged(address indexed delegate, uint256 previousVotes, uint256 newVotes)
      - event: Transfer(address indexed from, address indexed to, uint256 value)
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)
      - event: RewardsClaimed(address user, address rewardToken, uint256 amount)

  - name: UnstakingManager
    abi_file_path: ./abis/unstaking-manager.json
    events:
      - event: LockCreated(uint256 lockId, address user, uint256 amount, uint256 unlockTime)
      - event: LockCancelled(uint256 lockId)
      - event: LockClaimed(uint256 lockId)

  - name: Governance
    abi_file_path: ./abis/governor.json
    events:
      - event: ProposalCanceled(uint256 proposalId)
      - event: ProposalCreated(uint256 proposalId, address proposer, address[] targets, uint256[] values, string[] signatures, bytes[] calldatas, uint256 voteStart, uint256 voteEnd, string description)
      - event: ProposalExecuted(uint256 proposalId)
      - event: ProposalQueued(uint256 proposalId, uint256 etaSeconds)
      - event: ProposalThresholdSet(uint256 oldProposalThreshold, uint256 newProposalThreshold)
      - event: QuorumNumeratorUpdated(uint256 oldQuorumNumerator, uint256 newQuorumNumerator)
      - event: OptimisticParamsUpdated((uint48,uint32,uint256) optimisticParams)
      - event: ProposalThrottleUpdated(uint256 throttleCapacity)
      - event: VoteCast(address indexed voter, uint256 proposalId, uint8 support, uint256 weight, string reason)
      - event: VotingDelaySet(uint256 oldVotingDelay, uint256 newVotingDelay)
      - event: VotingPeriodSet(uint256 oldVotingPeriod, uint256 newVotingPeriod)

  - name: Timelock
    abi_file_path: ./abis/timelock.json
    events:
      - event: RoleGranted(bytes32 indexed role, address indexed account, address indexed sender)
        name: TimelockRoleGranted
      - event: RoleRevoked(bytes32 indexed role, address indexed account, address indexed sender)
        name: TimelockRoleRevoked
      - event: MinDelayChange(uint256 oldDuration, uint256 newDuration)
      - event: CallScheduled(bytes32 indexed id, uint256 indexed index, address target, uint256 value, bytes data, bytes32 predecessor, uint256 delay)
      - event: Cancelled(bytes32 indexed id)

