          - "0xE926577a152fFD5f5036f88BF7E8E8D3652B558C"  # v2.0
          - "0x5Bed18AcA50E6057E6658Fe8498004092EedCDcF"  # v4.0
          - "0x72f87239981159ed23673012EE3806Ca6114AB2A"  # v5.0
        start_block: 21818973
      # Dynamic contracts (registered by FolioDeployed / GovernedFolioDeployed
